services:
  init:
    image: alpine:3.21
    container_name: receipts-init
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        for secret in pg_password jwt_key admin_password grafana_password; do
          if [ ! -f "/secrets/$${secret}" ]; then
            if [ "$${secret}" = "admin_password" ]; then
              pw=$$(tr -dc 'A-Za-z0-9' < /dev/urandom | head -c 44)
              sym=$$(tr -dc '!@#%&*' < /dev/urandom | head -c 2)
              digit=$$(tr -dc '0-9' < /dev/urandom | head -c 1)
              upper=$$(tr -dc 'A-Z' < /dev/urandom | head -c 1)
              printf '%s%s%s%s' "$${pw}" "$${sym}" "$${digit}" "$${upper}" > "/secrets/$${secret}"
            else
              tr -dc 'A-Za-z0-9+/' < /dev/urandom | head -c 48 > "/secrets/$${secret}"
            fi
            chmod 644 "/secrets/$${secret}"
            echo "Generated /secrets/$${secret}"
          else
            echo "/secrets/$${secret} already exists, skipping"
          fi
        done
        echo "Secrets ready"
    volumes:
      - secrets:/secrets
    networks: []

  db:
    image: pgvector/pgvector:pg17
    container_name: receipts-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=receipts
      - POSTGRES_PASSWORD_FILE=/secrets/pg_password
      - POSTGRES_DB=receipts
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - secrets:/secrets:ro
      - db-data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "max_connections=20"
      - "-c"
      - "effective_cache_size=256MB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "wal_buffers=4MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U receipts -d receipts"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    networks:
      - receipts-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # VLM OCR: Ollama container serving the configured VLM (RECEIPTS-616 epic).
  # Named volume persists the model cache so the first-run ~3 GB pull only happens once.
  #
  # The `ollama list` healthcheck validates the Ollama daemon is responsive (it queries the
  # Ollama HTTP API under the hood and fails if the server is not yet listening). It does NOT
  # validate that the configured model is pulled — model presence is enforced on the `app`
  # service via depends_on vlm-ocr-pull: service_completed_successfully (RECEIPTS-636).
  vlm-ocr:
    image: ollama/ollama:latest
    container_name: receipts-vlm-ocr
    restart: unless-stopped
    volumes:
      - vlm-ocr-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          # Default model glm-ocr:q8_0 is ~1 GB; previous qwen2.5vl:3b Q4 is ~3.2 GB. Either runtime
          # needs headroom for weights + KV cache + compute graph (observed ~2-3 GB with 4k context).
          # Keep 6 GB ceiling so swapping VLM_MODEL to a heavier tag doesn't OOM.
          memory: 6G
          cpus: "4"
    networks:
      - receipts-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # One-shot sidecar: pulls the configured VLM model if it is not already cached, then exits.
  # Idempotent — subsequent runs find the model present and skip the download.
  #
  # `app` now gates startup on this sidecar exiting successfully (RECEIPTS-636), so a
  # non-zero exit here permanently blocks the API. To avoid that on transient network
  # errors during the ~3 GB cold-start pull, the command retries up to 5 times with
  # backoff before giving up.
  #
  # The model tag is parameterized via VLM_MODEL (single source of truth — RECEIPTS-635). Override
  # by exporting VLM_MODEL=<tag> or by setting it in a .env file alongside docker-compose.yml.
  vlm-ocr-pull:
    image: ollama/ollama:latest
    container_name: receipts-vlm-ocr-pull
    restart: "no"
    depends_on:
      vlm-ocr:
        condition: service_healthy
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        for i in 1 2 3 4 5; do
          if ollama list | grep -qF "$$VLM_MODEL"; then
            echo "$$VLM_MODEL already present; skipping pull"
            exit 0
          fi
          echo "Pulling $$VLM_MODEL (attempt $$i/5)..."
          if ollama pull "$$VLM_MODEL"; then
            exit 0
          fi
          echo "Pull failed; sleeping before retry"
          sleep 10
        done
        echo "All pull attempts failed" >&2
        exit 1
    environment:
      - OLLAMA_HOST=http://vlm-ocr:11434
      - VLM_MODEL=${VLM_MODEL:-glm-ocr:q8_0}
    networks:
      - receipts-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  app:
    image: ghcr.io/mggarofalo/receipts:${IMAGE_TAG:-latest}
    container_name: receipts-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PUID=1654
      - PGID=1654
      - TZ=America/New_York
      - ASPNETCORE_ENVIRONMENT=Production
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=receipts
      - POSTGRES_DB=receipts
      - Jwt__Issuer=receipts-api
      - Jwt__Audience=receipts-app
      - AdminSeed__Email=admin@example.com
      - AdminSeed__FirstName=Admin
      - AdminSeed__LastName=User
      - Ollama__BaseUrl=http://vlm-ocr:11434
      - Ocr__Vlm__Model=${VLM_MODEL:-glm-ocr:q8_0}
      # RECEIPTS-652: VLM provider switch. Default `ollama` keeps the local-only behavior;
      # set to `anthropic` (in your .env) to route receipt extraction through the Anthropic
      # Messages API instead. Provider=anthropic also requires ANTHROPIC_API_KEY to be set.
      - Ocr__Vlm__Provider=${OCR_VLM_PROVIDER:-ollama}
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY:-}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=receipts-api
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_BACKEND_DSN=${SENTRY_BACKEND_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      # Gate API startup on the pull sidecar exiting successfully — that proves both
      # (1) Ollama is healthy (the sidecar's own depends_on requires service_healthy on vlm-ocr)
      # and (2) qwen2.5vl:3b is pulled into the shared volume. This prevents the API smoke
      # test from racing the model pull on first cold start (RECEIPTS-636). Mirrors the
      # AppHost.cs pattern that uses .WaitForCompletion(vlmOcrPull) on the API resource.
      vlm-ocr-pull:
        condition: service_completed_successfully
      otel-collector:
        condition: service_started
    volumes:
      - secrets:/secrets:ro
      - app-data:/data
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          # BGE-large ONNX model (~1.34 GB) is mmap'd into the singleton
          # InferenceSession; keep headroom for .NET runtime + request load.
          memory: 3G
          cpus: "2"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    networks:
      - receipts-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # --- Observability Stack ---

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    container_name: receipts-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - tempo
      - loki
      - prometheus
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    networks:
      - receipts-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  tempo:
    image: grafana/tempo:2.7.2
    container_name: receipts-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./observability/tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - receipts-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  loki:
    image: grafana/loki:3.4.3
    container_name: receipts-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - receipts-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: receipts-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/config.yaml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./observability/prometheus/config.yaml:/etc/prometheus/config.yaml:ro
      - prometheus-data:/prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - receipts-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: receipts-grafana
    restart: unless-stopped
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/secrets/grafana_password
    ports:
      - "3000:3000"
    volumes:
      - secrets:/secrets:ro
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      init:
        condition: service_completed_successfully
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
      loki:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    networks:
      - receipts-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

volumes:
  secrets:
  db-data:
  app-data:
  vlm-ocr-models:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:

networks:
  receipts-net:
    driver: bridge
