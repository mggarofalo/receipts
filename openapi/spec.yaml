      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    SortBy:
      name: sortBy
      in: query
      required: false
      schema:
        type: string
      description: Column name to sort by. Allowed values depend on the entity type.
    SortDirection:
