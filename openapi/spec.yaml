      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YnabAccountListResponse"
        "503":
          description: YNAB integration is not configured

  /api/ynab/account-mappings:
    get:
      operationId: GetYnabAccountMappings
      tags: [YNAB]
      summary: List YNAB account mappings
      description: Returns all mappings between receipts accounts and YNAB accounts.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YnabAccountMappingListResponse"
    post:
      operationId: CreateYnabAccountMapping
      tags: [YNAB]
      summary: Create a YNAB account mapping
      description: Maps a receipts account to a YNAB account.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateYnabAccountMappingRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YnabAccountMappingResponse"
        "400":
          description: Invalid request (e.g. nonexistent receipts account)

  /api/ynab/account-mappings/{id}:
    put:
      operationId: UpdateYnabAccountMapping
      tags: [YNAB]
      summary: Update a YNAB account mapping
      description: Updates the YNAB account for an existing mapping.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateYnabAccountMappingRequest"
      responses:
        "204":
          description: No Content
        "404":
          description: Mapping not found
    delete:
      operationId: DeleteYnabAccountMapping
      tags: [YNAB]
      summary: Delete a YNAB account mapping
      description: Removes a mapping between a receipts account and a YNAB account.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content
        "404":
          description: Mapping not found

