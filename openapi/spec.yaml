            format: date
          description: Start date (ISO date string). Defaults to all time when omitted.
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date (ISO date string). Defaults to all time when omitted.
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [location, visits, total, averagePerVisit]
            default: total
          description: Column to sort by.
        - name: sortDirection
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort direction.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based).
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
