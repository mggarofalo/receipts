          content:
            application/json:
              schema:
                type: string

  /api/reports/item-descriptions:
    get:
      operationId: GetItemDescriptions
      tags: [Reports]
      summary: Search item descriptions for autocomplete
      description: Returns distinct item descriptions with their category and occurrence count, filtered by a search term (minimum 2 characters). Results are sorted by occurrences descending.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: search
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Search term to filter item descriptions (minimum 2 characters).
        - name: categoryOnly
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: When true, search and return categories instead of item descriptions.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
          description: Maximum number of results to return.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemDescriptionsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

  /api/reports/item-cost-over-time:
    get:
      operationId: GetItemCostOverTime
      tags: [Reports]
      summary: Get item cost over time
      description: Returns time-series cost data for a specific item description or category, optionally filtered by date range and bucketed by granularity.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: description
          in: query
          required: false
          schema:
            type: string
          description: Item description to filter by. Either description or category is required.
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Item category to filter by. Either description or category is required.
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date (ISO date string). Defaults to no lower bound.
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date (ISO date string). Defaults to no upper bound.
        - name: granularity
          in: query
          required: false
          schema:
            type: string
            enum: [exact, monthly, yearly]
            default: exact
          description: Time bucket granularity. "exact" returns each purchase date.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemCostOverTimeResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

  /api/reports/duplicates:
    get:
      operationId: GetDuplicateDetectionReport
      tags: [Reports]
      summary: Get duplicate receipt detection report
      description: Finds receipts that share the same date+location, date+total, or all three fields and may be double entries.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: matchOn
          in: query
          required: false
          schema:
            type: string
            enum: [DateAndLocation, DateAndTotal, DateAndLocationAndTotal]
            default: DateAndLocation
          description: Which fields to compare when detecting duplicates.
        - name: locationTolerance
          in: query
          required: false
          schema:
            type: string
            enum: [exact, normalized]
            default: exact
          description: "How to compare locations: exact (case-sensitive) or normalized (trimmed, lowercased, whitespace-collapsed)."
        - name: totalTolerance
          in: query
          required: false
          schema:
            type: number
            format: double
            default: 0
            minimum: 0
          description: Maximum difference between transaction totals to still consider them matching. Default 0 (exact match).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicatesResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

  /api/reports/category-trends:
    get:
      operationId: GetCategoryTrendsReport
      tags: [Reports]
      summary: Get category spending trends over time
      description: Returns time-series spending data broken down by category. Categories beyond the topN threshold are collapsed into "Other". Buckets are dense and zero-filled.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Start date (ISO date string). Defaults to all time.
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
          description: End date (ISO date string). Defaults to today.
        - name: granularity
          in: query
          required: false
          schema:
            type: string
            enum: [daily, monthly, quarterly, yearly]
            default: monthly
          description: Time bucket granularity.
        - name: topN
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 7
          description: Number of top categories to show. Remaining categories are collapsed into "Other".
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryTrendsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

  /api/reports/uncategorized-items:
    get:
      operationId: GetUncategorizedItemsReport
      tags: [Reports]
      summary: Get uncategorized items report
      description: Returns all receipt items where the category is "Uncategorized".
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [description, total, itemCode]
            default: description
          description: Column to sort by.
        - name: sortDirection
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort direction.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based).
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Number of items per page.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UncategorizedItemsResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

