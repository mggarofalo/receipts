    post:
      operationId: ScanReceipt
      tags: [Receipts]
      summary: Scan a receipt image and return a proposed receipt
      description: >
        Accepts a JPEG or PNG image, runs preprocessing, OCR, and parsing,
        then returns a proposed receipt with per-field confidence scores.
        The proposal is NOT persisted — it is a transient suggestion for review.
      security:
        - BearerAuth: []
        - ApiKey: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  $ref: "#/components/schemas/IFormFile"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposedReceiptResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string
        "415":
          description: Unsupported Media Type
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
            text/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "422":
          description: Unprocessable Entity — image could not be read or OCR returned no text
          content:
            application/json:
              schema:
                type: string

