  /api/reports/out-of-balance:
    get:
      operationId: GetOutOfBalanceReport
      tags: [Reports]
      summary: Get out-of-balance receipts report
      description: Returns all receipts where item subtotal + tax + adjustments does not equal the transaction total.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [date, difference]
            default: date
          description: Column to sort by.
        - name: sortDirection
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort direction.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based).
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Number of items per page.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutOfBalanceResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

