        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YnabCategoryMappingListResponse"
    post:
      operationId: CreateYnabCategoryMapping
      tags: [YNAB]
      summary: Create a category mapping
      description: Creates a new mapping from a receipts category to a YNAB category.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateYnabCategoryMappingRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YnabCategoryMappingResponse"
        "409":
          description: Conflict — mapping for this receipts category already exists

  /api/ynab/category-mappings/{id}:
    put:
      operationId: UpdateYnabCategoryMapping
      tags: [YNAB]
      summary: Update a category mapping
      description: Updates the YNAB category for an existing mapping.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateYnabCategoryMappingRequest"
      responses:
        "204":
          description: No Content
    delete:
      operationId: DeleteYnabCategoryMapping
      tags: [YNAB]
      summary: Delete a category mapping
      description: Permanently deletes a category mapping.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No Content

  /api/ynab/category-mappings/unmapped:
    get:
      operationId: GetUnmappedCategories
      tags: [YNAB]
      summary: Get unmapped receipt categories
      description: Returns receipts categories that do not yet have a YNAB category mapping.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnmappedCategoriesResponse"

  /api/ynab/sync-memos:
    post:
      operationId: SyncYnabMemos
      tags: [YNAB]
      summary: Sync YNAB memo for a receipt
      description: Matches local transactions to YNAB transactions and updates their memos with a receipt link.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncYnabMemosRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YnabMemoSyncResponse"
        "503":
          description: YNAB integration is not configured

  /api/ynab/sync-memos/bulk:
    post:
      operationId: SyncYnabMemosBulk
      tags: [YNAB]
      summary: Bulk sync YNAB memos
      description: Batch syncs YNAB memos for multiple receipts.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncYnabMemosBulkRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YnabMemoSyncResponse"
        "503":
          description: YNAB integration is not configured

  /api/ynab/sync-memos/resolve:
    post:
      operationId: ResolveYnabMemoSync
      tags: [YNAB]
      summary: Resolve ambiguous YNAB memo sync
      description: Resolves an ambiguous match by linking a local transaction to a specific YNAB transaction.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveYnabMemoSyncRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YnabMemoSyncResultItem"
        "503":
          description: YNAB integration is not configured

  /api/ynab/sync-status/{transactionId}:
    get:
      operationId: GetYnabSyncStatus
      tags: [YNAB]
      summary: Get YNAB sync status for a transaction
      description: Returns the sync record for a given local transaction ID and sync type.
      security:
        - BearerAuth: []
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: syncType
          in: query
          required: true
          schema:
            type: string
            enum: [MemoUpdate, TransactionPush]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YnabSyncRecordResponse"
        "404":
          description: No sync record found

  /api/ynab/push-transactions:
    post:
      operationId: PushYnabTransactions
      tags: [YNAB]
      summary: Push receipt transactions to YNAB
      description: >
        Creates split transactions in YNAB from a single receipt.
        Allocates tax and adjustments proportionally across item categories.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushYnabTransactionsRequest"
      responses:
        "200":
          description: Push completed (check result for per-transaction status)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushYnabTransactionsResponse"
        "400":
          description: Validation failed (unmapped categories, currency mismatch, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushYnabTransactionsResponse"
        "503":
          description: YNAB integration is not configured

  /api/ynab/push-transactions/bulk:
    post:
      operationId: BulkPushYnabTransactions
      tags: [YNAB]
      summary: Push transactions for multiple receipts to YNAB
      description: >
        Creates split transactions in YNAB for each receipt in the batch.
        Each receipt is processed independently; failures don't block other receipts.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkPushYnabTransactionsRequest"
      responses:
        "200":
          description: Bulk push completed (check per-receipt results)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkPushYnabTransactionsResponse"
        "503":
          description: YNAB integration is not configured

components:
  schemas:
    # ── Reports ───────────────────────────────────

    OutOfBalanceResponse:
      type: object
      required: [totalCount, totalDiscrepancy, items]
      properties:
        totalCount:
          type: integer
          format: int32
        totalDiscrepancy:
          type: number
          format: double
        items:
          type: array
          items:
            $ref: "#/components/schemas/OutOfBalanceItem"

    OutOfBalanceItem:
      type: object
      required: [receiptId, location, date, itemSubtotal, taxAmount, adjustmentTotal, expectedTotal, transactionTotal, difference]
      properties:
        receiptId:
          type: string
          format: uuid
        location:
          type: string
        date:
          type: string
          format: date
        itemSubtotal:
          type: number
          format: double
        taxAmount:
          type: number
          format: double
        adjustmentTotal:
          type: number
          format: double
        expectedTotal:
          type: number
          format: double
        transactionTotal:
          type: number
          format: double
        difference:
          type: number
          format: double

    SpendingByLocationResponse:
      type: object
      required: [totalCount, grandTotal, items]
      properties:
        totalCount:
          type: integer
          format: int32
        grandTotal:
          type: number
          format: double
        items:
          type: array
          items:
            $ref: "#/components/schemas/SpendingByLocationItem"

    SpendingByLocationItem:
      type: object
      required: [location, visits, total, averagePerVisit]
      properties:
        location:
          type: string
        visits:
          type: integer
          format: int32
        total:
          type: number
          format: double
        averagePerVisit:
          type: number
          format: double


    ItemSimilarityResponse:
      type: object
      required: [totalCount, groups]
      properties:
        totalCount:
          type: integer
          format: int32
          description: Total number of similarity groups.
        groups:
          type: array
          items:
            $ref: "#/components/schemas/ItemSimilarityGroup"

    ItemSimilarityGroup:
      type: object
      required: [canonicalName, variants, itemIds, occurrences, maxSimilarity]
      properties:
        canonicalName:
          type: string
          description: Most frequent description in the cluster (ties broken by longest).
        variants:
          type: array
          items:
            type: string
