      tags: [Reports]
      summary: Get item similarity clusters
      description: Returns groups of receipt items with similar descriptions using trigram matching. Items are clustered via connected-component analysis.
      security:
        - BearerAuth: []
        - ApiKey: []
      parameters:
        - name: threshold
          in: query
          required: false
          schema:
            type: number
            format: double
            minimum: 0.3
            maximum: 0.95
            default: 0.7
          description: Minimum trigram similarity score (0.3 to 0.95).
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [canonicalName, occurrences, maxSimilarity]
            default: occurrences
          description: Column to sort by.
        - name: sortDirection
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort direction.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number (1-based).
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Number of items per page.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemSimilarityResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                type: string

