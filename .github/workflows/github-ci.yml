name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: ["main", "develop"]

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NODE_VERSION: "20"

jobs:
  source-branch-check:
    name: Source Branch Policy
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Check source branch
        env:
          SOURCE: ${{ github.head_ref }}
        run: |
          if [[ "$SOURCE" == "develop" || "$SOURCE" == release-please--* || "$SOURCE" == hotfix/* ]]; then
            echo "✅ Branch '$SOURCE' is allowed to merge to main."
          else
            echo "::error::Branch '$SOURCE' is not allowed to merge directly to main."
            echo ""
            echo "Only these branches may target main:"
            echo "  - develop"
            echo "  - release-please--*"
            echo "  - hotfix/*"
            echo ""
            echo "Please retarget your PR to 'develop' instead."
            exit 1
          fi

  pr-title:
    name: Conventional Commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - uses: amannn/action-semantic-pull-request@v5
        with:
          types: |
            feat
            fix
            docs
            refactor
            test
            chore
          scopes: |
            api
            client
            domain
            application
            infrastructure
            infra
            common
            shared
            ci
            docs
            hooks
          subjectPattern: ^[a-z].*$
          subjectPatternError: |
            The PR title subject must start with a lowercase letter.
            Example: "feat(api): add pagination support"
          ignoreLabels: |
            autorelease: pending
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build & Test
    needs: [pr-title]
    if: ${{ !cancelled() && (needs.pr-title.result == 'success' || needs.pr-title.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Receipts.slnx

      - name: Build with warnings-as-errors
        run: dotnet build Receipts.slnx --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: >-
          dotnet test Receipts.slnx
          --no-build
          --verbosity normal
          --filter "Category!=Integration"
          --collect:"XPlat Code Coverage"
          --settings scripts/tests/coverlet.runsettings
          --results-directory TestResults

      - name: Merge coverage reports
        if: always()
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: TestResults/**/coverage.cobertura.xml
          targetdir: TestResults/merged
          reporttypes: Cobertura;MarkdownSummaryGithub

      - name: Enforce backend coverage threshold
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: TestResults/merged/Cobertura.xml
          format: markdown
          output: both
          badge: false
          thresholds: '78 70'
          fail_below_min: true

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-backend
          path: TestResults/merged/SummaryGithub.md

  frontend-test:
    name: Frontend Test (Shard ${{ matrix.shard }}/2)
    needs: [pr-title]
    if: ${{ !cancelled() && (needs.pr-title.result == 'success' || needs.pr-title.result == 'skipped') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/client

      - name: Build client
        run: npm run build
        working-directory: src/client

      - name: Run tests with coverage
        run: npx vitest run --shard=${{ matrix.shard }}/2 --reporter=blob --coverage
        working-directory: src/client
        env:
          VITEST_SHARD: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-shard-${{ matrix.shard }}
          path: src/client/.vitest-reports
          include-hidden-files: true
          retention-days: 1

  frontend-test-report:
    name: Frontend Coverage Report
    needs: [pr-title, frontend-test]
    if: ${{ !cancelled() && (needs.frontend-test.result == 'success' || needs.frontend-test.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/client

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          path: src/client/.vitest-reports
          pattern: frontend-test-shard-*
          merge-multiple: true

      - name: Merge reports and coverage
        run: npx vitest --merge-reports --coverage
        working-directory: src/client

      - name: Generate coverage summary
        if: success() || failure()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: src/client/coverage/cobertura-coverage.xml
          format: markdown
          output: both
          badge: false
          thresholds: '80 80'
          fail_below_min: true

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-frontend
          path: code-coverage-results.md

  lint:
    name: Code Formatting
    needs: [pr-title]
    if: ${{ !cancelled() && (needs.pr-title.result == 'success' || needs.pr-title.result == 'skipped') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Receipts.slnx

      - name: Check formatting
        run: dotnet format Receipts.slnx --no-restore --verify-no-changes

  security:
    name: Vulnerability Scan
    needs: [pr-title]
    if: ${{ !cancelled() && (needs.pr-title.result == 'success' || needs.pr-title.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Receipts.slnx

      - name: Check for vulnerable packages
        run: |
          OUTPUT=$(dotnet list Receipts.slnx package --vulnerable 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable packages detected!"
            exit 1
          fi

  docker-build:
    name: Docker Build Check
    needs: [pr-title]
    if: ${{ needs.pr-title.result == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha,scope=docker-build-check
          cache-to: type=gha,mode=min,scope=docker-build-check

  api-compat:
    name: API Breaking Changes
    needs: [pr-title]
    if: ${{ needs.pr-title.result == 'success' && !contains(github.event.pull_request.labels.*.name, 'breaking-changes-allowed') }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Check for breaking API changes
        run: node scripts/check-breaking.mjs origin/${{ github.base_ref }}
